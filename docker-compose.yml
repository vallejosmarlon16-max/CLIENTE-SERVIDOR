version: '3.8'

services:
  database:
    image: mongo:latest
    container_name: spa-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - spa-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spa-backend
    ports:
      - "8081:8080"
    environment:
      - MONGO_URI=mongodb://database:27017
      - PORT=8080
    depends_on:
      - database
    networks:
      - spa-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spa-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - spa-network

volumes:
  mongo-data:

networks:
  spa-network:
    driver: bridge
